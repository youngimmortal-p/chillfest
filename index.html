<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ticket Generator</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h2>🎫 Event Ticket Generator</h2>

    <input type="text" id="name" placeholder="Your Name" />
    <input type="email" id="email" placeholder="Your Email" />

    <button id="generateBtn">Generate Ticket</button>

    <div id="ticket" style="display:none;">
      <h3 id="status"></h3>
      <p><strong>ID:</strong> <span id="ticketId"></span></p>
      <p><strong>Name:</strong> <span id="ticketName"></span></p>
      <p><strong>Email:</strong> <span id="ticketEmail"></span></p>
      <div id="qrCode"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
