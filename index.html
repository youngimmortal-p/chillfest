
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Verse | Ticket Portal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg-dark: #02050c;
            --card-deep: #050f28;
            --accent-gold: #ffc400;
            --electric-blue: #00e0ff;
            --glow-blue: rgba(0, 224, 255, 0.4);
            --text-silver: #a0a8c0;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 10% 20%, #0a1e46 0%, #02050c 90%);
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            padding: 20px;
        }

        /* --- Input Form --- */
        .glass-card {
            background: rgba(5, 15, 40, 0.8); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 224, 255, 0.2); border-radius: 16px;
            padding: 40px; width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h1.form-title { color: var(--accent-gold); text-transform: uppercase; letter-spacing: 4px; font-weight: 900; margin: 0 0 10px 0; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; color: var(--electric-blue); text-transform: uppercase; margin-bottom: 8px; font-weight: 800; }
        
        input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(0, 224, 255, 0.2);
            padding: 14px; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box;
        }

        input:focus { border-color: var(--accent-gold); outline: none; }

        #generateTicketBtn {
            width: 100%; background: linear-gradient(135deg, #ffc400, #ff9100); color: #000;
            border: none; padding: 16px; border-radius: 8px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        /* --- Premium Ticket UI --- */
        #ticket { 
            display: none; width: 360px; position: relative;
            filter: drop-shadow(0 15px 35px rgba(0,0,0,0.8));
        }

        .ticket-bg {
            background-color: var(--card-deep);
            background-image: linear-gradient(rgba(0,0,0,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            border: 2px solid var(--electric-blue);
            border-radius: 12px; overflow: hidden; position: relative;
        }

        .ticket-header {
            background: linear-gradient(90deg, rgba(0,224,255,0.1), transparent);
            padding: 20px; border-bottom: 1px solid rgba(0, 224, 255, 0.2);
        }

        .event-title { color: white; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .ticket-body { padding: 25px; }

        .data-field { margin-bottom: 18px; }
        .field-label { font-size: 9px; color: var(--text-silver); text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .field-value { font-size: 17px; color: white; font-weight: 700; margin: 2px 0; text-transform: uppercase; }
        .field-value.highlight { color: var(--accent-gold); font-family: monospace; }

        .qr-section {
            text-align: center; padding: 20px; background: rgba(255,255,255,0.03);
            border-top: 1px dashed rgba(255,255,255,0.1);
        }

        #qrCode { 
            background: white; padding: 10px; display: inline-block; 
            border-radius: 8px; border: 3px solid var(--electric-blue);
        }

        #downloadBtn {
            width: 100%; background: transparent; color: var(--electric-blue);
            border: 2px solid var(--electric-blue); padding: 14px; border-radius: 8px; 
            font-weight: 700; cursor: pointer; margin-top: 15px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="glass-card" id="form-card">
        <h1 class="form-title">Game Verse</h1>
        <p style="color: #aaa; font-size: 13px; margin-bottom: 30px;">// AUTHENTICATION REQUIRED</p>
        
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter Name">
        </div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@example.com">
        </div>
        <div class="input-group">
            <label>Voucher Code</label>
            <input type="text" id="accessCode" placeholder="GV-XXXXXX">
        </div>

        <button id="generateTicketBtn">Verify & Initialize</button>
    </div>

    <div id="ticket">
        <div class="ticket-bg">
            <div class="ticket-header">
                <h2 class="event-title">Game Verse 2026</h2>
                <p style="color: var(--accent-gold); font-size: 9px; margin: 0;">OFFICIAL ACCESS TOKEN</p>
            </div>

            <div class="ticket-body">
                <div class="data-field">
                    <p class="field-label">Attendee</p>
                    <p class="field-value" id="ticketName"></p>
                </div>
                <div class="data-field">
                    <p class="field-label">Protocol ID</p>
                    <p class="field-value highlight" id="ticketId"></p>
                </div>
                <div style="display:flex; justify-content: space-between;">
                    <div><p class="field-label">Tier</p><p class="field-value">VIP</p></div>
                    <div><p class="field-label">Status</p><p class="field-value" style="color:#0f0;">READY</p></div>
                </div>
            </div>

            <div class="qr-section">
                <div id="qrCode"></div>
                <p style="font-size: 8px; color: var(--text-silver); margin-top: 10px;">SCAN FOR ENTRY VALIDATION</p>
            </div>
        </div>
        <button id="downloadBtn">📥 Download Secure Pass</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBqrO6qxMSEzP-QX8WYIxSDruHvHbweR3w",
        authDomain: "ticket-ab343.firebaseapp.com",
        projectId: "ticket-ab343",
        storageBucket: "ticket-ab343.firebasestorage.app",
        messagingSenderId: "248675766848",
        appId: "1:248675766848:web:79aa612820e7ee7ec605a5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    emailjs.init("u9yWeM-XyHO8w3jK6");

    const btn = document.getElementById("generateTicketBtn");

    btn.addEventListener("click", async () => {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim().toLowerCase();
        const code = document.getElementById("accessCode").value.trim().toUpperCase();

        if (!name || !email || !code) return alert("Complete all fields.");

        btn.disabled = true;
        btn.innerText = "VERIFYING...";

        try {
            const codeRef = doc(db, "vouchers", code);
            const codeSnap = await getDoc(codeRef);

            if (!codeSnap.exists()) {
                alert("Invalid Access Code.");
                resetBtn();
                return;
            }

            const data = codeSnap.data();

            // RE-CLAIM CHECK
            if (data.isClaimed) {
                if (data.assignedEmail === email) {
                    showTicketUI(data.ticketId, data.userName, email);
                } else {
                    alert("Code already used by another email.");
                    resetBtn();
                }
                return;
            }

            // DUPLICATE EMAIL CHECK
            const q = query(collection(db, "vouchers"), where("assignedEmail", "==", email));
            const qSnap = await getDocs(q);
            if (!qSnap.empty) {
                alert("This email has already claimed a ticket.");
                resetBtn();
                return;
            }

            // SUCCESS - UPDATE FIRESTORE
            const ticketId = "GV-" + Math.random().toString(36).substring(2, 9).toUpperCase();
            await updateDoc(codeRef, {
                isClaimed: true,
                assignedEmail: email,
                userName: name,
                ticketId: ticketId
            });

            // Send Email
            emailjs.send("service_dsqdvyn", "template_epdeeln", { to_name: name, to_email: email, ticket_id: ticketId });

            showTicketUI(ticketId, name, email);

        } catch (err) {
            console.error(err);
            alert("Error: " + err.message);
            resetBtn();
        }
    });

    function showTicketUI(id, name, email) {
        document.getElementById("ticketName").innerText = name;
        document.getElementById("ticketId").innerText = id;

        const qrContainer = document.getElementById('qrCode');
        qrContainer.innerHTML = '';
        new QRCode(qrContainer, { text: id, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.H });

        document.getElementById("form-card").style.display = "none";
        document.getElementById("ticket").style.display = "block";

        document.getElementById("downloadBtn").onclick = () => downloadPDF(id, name, email);
    }

    function resetBtn() {
        btn.disabled = false;
        btn.innerText = "Verify & Initialize";
    }

    async function downloadPDF(id, name, email) {
    const dBtn = document.getElementById("downloadBtn");
    const originalText = dBtn.innerText;
    dBtn.innerText = "ENCRYPTING PASS...";
    dBtn.disabled = true;

    try {
        const qrContainer = document.getElementById("qrCode");
        let qrData;

        // Securely capture the QR data source
        const canvasElement = qrContainer.querySelector("canvas");
        if (canvasElement) {
            qrData = canvasElement.toDataURL("image/png");
        } else {
            const imgElement = qrContainer.querySelector("img");
            qrData = imgElement.src;
        }

        const { jsPDF } = window.jspdf;
        // 100mm x 150mm is a standard VIP Badge size
        const pdf = new jsPDF("p", "mm", [100, 150]);

        // --- BACKGROUND LAYER ---
        pdf.setFillColor(5, 15, 40); // Deep Navy
        pdf.rect(0, 0, 100, 150, "F");

        // --- DESIGN ACCENTS ---
        // Top Yellow Banner
        pdf.setFillColor(255, 196, 0); 
        pdf.rect(0, 0, 100, 25, "F");

        // Side "Stub" Aesthetic (Vertical Bar)
        pdf.setFillColor(0, 224, 255); // Electric Blue
        pdf.rect(0, 0, 8, 150, "F");

        // --- HEADER TEXT ---
        pdf.setTextColor(5, 15, 40); // Dark text on yellow
        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(18);
        pdf.text("GAME VERSE", 54, 12, { align: "center" });
        
        pdf.setFontSize(8);
        pdf.setFont("helvetica", "normal");
        pdf.text("OFFICIAL ACCESS PROTOCOL // 2026", 54, 18, { align: "center" });

        // --- ATTENDEE BOX ---
        pdf.setDrawColor(0, 224, 255);
        pdf.setLineWidth(0.5);
        pdf.line(15, 35, 90, 35); // Top divider

        pdf.setTextColor(255, 255, 255);
        pdf.setFontSize(9);
        pdf.text("AUTHORIZED ATTENDEE", 15, 42);
        
        pdf.setFontSize(16);
        pdf.setFont("helvetica", "bold");
        pdf.setTextColor(255, 196, 0); // Name in Gold
        pdf.text(name.toUpperCase(), 15, 52);

        // --- ACCESS ID BOX ---
        pdf.setTextColor(255, 255, 255);
        pdf.setFontSize(9);
        pdf.setFont("helvetica", "normal");
        pdf.text("VALIDATION HASH", 15, 65);
        
        pdf.setFontSize(11);
        pdf.setFont("courier", "bold"); // Tech/Monospace feel
        pdf.setTextColor(0, 224, 255);
        pdf.text(id, 15, 72);

        // --- QR CODE CONTAINER ---
        // Background for the QR to make it "Pop"
        pdf.setFillColor(255, 255, 255);
        pdf.roundedRect(25, 85, 50, 50, 3, 3, "F");
        
        // The QR Code itself
        pdf.addImage(qrData, "PNG", 27, 87, 46, 46, undefined, 'FAST');

        // --- FOOTER / SECURITY ---
        pdf.line(15, 142, 90, 142); // Bottom divider
        pdf.setTextColor(0, 224, 255);
        pdf.setFont("helvetica", "italic");
        pdf.setFontSize(7);
        pdf.text("DO NOT DUPLICATE // SCAN AT TERMINAL", 54, 146, { align: "center" });

        // Final Trigger
        pdf.save(`GV26_Ticket_${name.replace(/\s+/g, '_')}.pdf`);

    } catch (e) {
        console.error("PDF Final Render Error:", e);
        alert("The secure transfer failed. Please try again.");
    } finally {
        dBtn.innerText = originalText;
        dBtn.disabled = false;
    }
}
</script>
</body>
</html>
